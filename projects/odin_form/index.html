<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel = "stylesheet" href = "styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Storm&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <section class = "Left">
            <div class = "Title">
                <img src = "odin logo.png">
                <h1>Odin</h1>
            </div>
            <p> Photo by Halle West on Unplash </p>
        </section>
        <section class = "Right">
            <div>
                <h3>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. </h3>
                <h3>Sign up now to get started.</h3>
                <h3>You know you want to.</h3>
            </div>
            <div>
                <h3>Let's do this!</h3>
                <form>
                    <nav>
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName">
                    </nav>

                    <nav>
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName">
                    </nav>

                    <nav>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </nav>

                    <nav>
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone">
                    </nav>

                    <nav>
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password">
                    </nav>

                    <nav>
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword">
                    </nav>
                </form>
            </div>
            <div>
                <input type = "Submit" value = "Create account">
                <p>Already have an account? <a>Log in</a></p>
            </div>
        </section>
    </main>
</body>
</html>
