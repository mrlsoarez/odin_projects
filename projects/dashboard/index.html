<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel = "stylesheet" href = "styles.css">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>
<body>
    <div class = "Main">
        <div class = "Left">
            <span>
                <section>
                    <div>
                        <i class="bx-transparency"></i>
                        <h3>Dashboard</h3>
                    </div>
                </section>
                <section>
                    <div>
                        <i class="bx bx-home"></i>
                        <p> Home </p>
                    </div>
                    <div>
                        <i class="bx bx-user-id-card"></i>
                        <p> Profile</p>
                    </div>
                    <div>
                        <i class="bx bx-message-reply"></i>
                        <p> Messages </p>
                    </div>
                    <div>
                        <i class="bx bx-history"></i>
                        <p> History </p>
                    </div>
                    <div>
                        <i class="bx bx-task"></i>
                        <p> Tasks</p>
                    </div>
                    <div>
                        <i class="bx bx-community"></i>
                        <p>Communities</p>
                    </div>
                </section>
                <section>
                    <div>
                        <i class="bx bx-cog"></i>
                        <p>Settings</p>
                    </div>
                    <div>
                        <i class="bx bx-help-circle"></i>
                        <p>Support</p>
                    </div>
                    <div>
                        <i class="bx bx-shield"></i>
                        <p>Privacy</p>
                    </div>
                </section>
            </span>
        </div>
        <div class = "Right">
            <section>
                <div class = "Search">
                    <i class="bx-search"></i>
                    <input type = "text">
                </div>
                <div class = "Icon">
                    <i class="bx-bell"></i>
                    <div class = "Image"><img src = "#"></div>
                    <h4>Morgan</h4>
                </div>
            </section>
            <section>
                <div class = "Introduct">
                    <div id = "img"><img src = "#"></div>
                    <div>
                        <p>Hi there,</p>
                        <h3>Morgan Oakley (@morgan_oakley)</h3>
                    </div>
                </div>
                <div class = "Buttons">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
